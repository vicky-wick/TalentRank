<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Matcher</title>
    <style>
        :root {
            --font-DelaGothicOne: 'Inter', sans-serif;
            --font-SpaceMono: monospace;
        }
        body { 
            background: #121212; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .form {
          --background: #d3d3d3;
          --input-focus: #2d8cf0;
          --font-color: #323232;
          --font-color-sub: #666;
          --bg-color: #fff;
          --main-color: #323232;
          padding: 20px;
          background: var(--background);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 20px;
          border-radius: 5px;
          border: 2px solid var(--main-color);
          box-shadow: 4px 4px var(--main-color);
          width: 350px;
        }

        .form > p {
          font-family: var(--font-DelaGothicOne);
          color: var(--font-color);
          font-weight: 700;
          font-size: 20px;
          margin-bottom: 15px;
          display: flex;
          flex-direction: column;
          text-align: center;
        }

        .form > p > span {
          font-family: var(--font-SpaceMono);
          color: var(--font-color-sub);
          font-weight: 600;
          font-size: 14px;
          margin-top: 5px;
        }

        .separator {
          width: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 5px;
        }

        .separator > div {
          width: 100px;
          height: 3px;
          border-radius: 5px;
          background-color: var(--font-color-sub);
        }

        .separator > span {
          color: var(--font-color);
          font-family: var(--font-SpaceMono);
          font-weight: 600;
        }

        .oauthButton {
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 5px;
          width: 250px;
          height: 40px;
          border-radius: 5px;
          border: 2px solid var(--main-color);
          background-color: var(--bg-color);
          box-shadow: 4px 4px var(--main-color);
          font-size: 16px;
          font-weight: 600;
          color: var(--font-color);
          cursor: pointer;
          transition: all 250ms;
          position: relative;
          overflow: hidden;
          z-index: 1;
        }

        .oauthButton::before {
          content: "";
          position: absolute;
          top: 0;
          left: 0;
          height: 100%;
          width: 0;
          background-color: #212121;
          z-index: -1;
          -webkit-box-shadow: 4px 8px 19px -3px rgba(0, 0, 0, 0.27);
          box-shadow: 4px 8px 19px -3px rgba(0, 0, 0, 0.27);
          transition: all 250ms;
        }

        .oauthButton:hover {
          color: #e8e8e8;
        }

        .oauthButton:hover::before {
          width: 100%;
        }

        .form > input {
          width: 230px;
          height: 30px;
          border-radius: 5px;
          border: 2px solid var(--main-color);
          background-color: var(--bg-color);
          box-shadow: 4px 4px var(--main-color);
          font-size: 14px;
          font-weight: 600;
          color: var(--font-color);
          padding: 5px 10px;
          outline: none;
        }

        /* From Uiverse.io by gustavofusco */ 
        .pencil {
          display: none;
          width: 10em;
          height: 10em;
        }

        .pencil__body1,
        .pencil__body2,
        .pencil__body3,
        .pencil__eraser,
        .pencil__eraser-skew,
        .pencil__point,
        .pencil__rotate,
        .pencil__stroke {
          animation-duration: 3s;
          animation-timing-function: linear;
          animation-iteration-count: infinite;
        }

        .pencil__body1,
        .pencil__body2,
        .pencil__body3 {
          transform: rotate(-90deg);
        }

        .pencil__body1 { animation-name: pencilBody1; }
        .pencil__body2 { animation-name: pencilBody2; }
        .pencil__body3 { animation-name: pencilBody3; }
        .pencil__eraser { animation-name: pencilEraser; transform: rotate(-90deg) translate(49px,0); }
        .pencil__eraser-skew { animation-name: pencilEraserSkew; animation-timing-function: ease-in-out; }
        .pencil__point { animation-name: pencilPoint; transform: rotate(-90deg) translate(49px,-30px); }
        .pencil__rotate { animation-name: pencilRotate; }
        .pencil__stroke { animation-name: pencilStroke; transform: translate(100px,100px) rotate(-113deg); }

        /* Animations */
        @keyframes pencilBody1 {
          from, to { stroke-dashoffset: 351.86; transform: rotate(-90deg); }
          50% { stroke-dashoffset: 150.8; transform: rotate(-225deg); }
        }
        @keyframes pencilBody2 {
          from, to { stroke-dashoffset: 406.84; transform: rotate(-90deg); }
          50% { stroke-dashoffset: 174.36; transform: rotate(-225deg); }
        }
        @keyframes pencilBody3 {
          from, to { stroke-dashoffset: 296.88; transform: rotate(-90deg); }
          50% { stroke-dashoffset: 127.23; transform: rotate(-225deg); }
        }
        @keyframes pencilEraser {
          from, to { transform: rotate(-45deg) translate(49px,0); }
          50% { transform: rotate(0deg) translate(49px,0); }
        }
        @keyframes pencilEraserSkew {
          from, 32.5%, 67.5%, to { transform: skewX(0); }
          35%, 65% { transform: skewX(-4deg); }
          37.5%, 62.5% { transform: skewX(8deg); }
          40%, 45%, 50%, 55%, 60% { transform: skewX(-15deg); }
          42.5%, 47.5%, 52.5%, 57.5% { transform: skewX(15deg); }
        }
        @keyframes pencilPoint {
          from, to { transform: rotate(-90deg) translate(49px,-30px); }
          50% { transform: rotate(-225deg) translate(49px,-30px); }
        }
        @keyframes pencilRotate {
          from { transform: translate(100px,100px) rotate(0); }
          to { transform: translate(100px,100px) rotate(720deg); }
        }
        @keyframes pencilStroke {
          from { stroke-dashoffset: 439.82; transform: translate(100px,100px) rotate(-113deg); }
          50% { stroke-dashoffset: 164.93; transform: translate(100px,100px) rotate(-113deg); }
          75%, to { stroke-dashoffset: 439.82; transform: translate(100px,100px) rotate(112deg); }
        }
    </style>
</head>
<body>
    
    <div id="loader" class="pencil-container" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" height="200px" width="200px" viewBox="0 0 200 200" class="pencil" style="display: block;">
            <defs>
                <clipPath id="pencil-eraser">
                    <rect height="30" width="30" ry="5" rx="5"></rect>
                </clipPath>
            </defs>
            <circle transform="rotate(-113,100,100)" stroke-linecap="round" stroke-dashoffset="439.82" stroke-dasharray="439.82 439.82" stroke-width="2" stroke="currentColor" fill="none" r="70" class="pencil__stroke"></circle>
            <g transform="translate(100,100)" class="pencil__rotate">
                <g fill="none">
                    <circle transform="rotate(-90)" stroke-dashoffset="402" stroke-dasharray="402.12 402.12" stroke-width="30" stroke="hsl(223,90%,50%)" r="64" class="pencil__body1"></circle>
                    <circle transform="rotate(-90)" stroke-dashoffset="465" stroke-dasharray="464.96 464.96" stroke-width="10" stroke="hsl(223,90%,60%)" r="74" class="pencil__body2"></circle>
                    <circle transform="rotate(-90)" stroke-dashoffset="339" stroke-dasharray="339.29 339.29" stroke-width="10" stroke="hsl(223,90%,40%)" r="54" class="pencil__body3"></circle>
                </g>
                <g transform="rotate(-90) translate(49,0)" class="pencil__eraser">
                    <g class="pencil__eraser-skew">
                        <rect height="30" width="30" ry="5" rx="5" fill="hsl(223,90%,70%)"></rect>
                        <rect clip-path="url(#pencil-eraser)" height="30" width="5" fill="hsl(223,90%,60%)"></rect>
                        <rect height="20" width="30" fill="hsl(223,10%,90%)"></rect>
                        <rect height="20" width="15" fill="hsl(223,10%,70%)"></rect>
                        <rect height="20" width="5" fill="hsl(223,10%,80%)"></rect>
                        <rect height="2" width="30" y="6" fill="hsla(223,10%,10%,0.2)"></rect>
                        <rect height="2" width="30" y="13" fill="hsla(223,10%,10%,0.2)"></rect>
                    </g>
                </g>
                <g transform="rotate(-90) translate(49,-30)" class="pencil__point">
                    <polygon points="15 0,30 30,0 30" fill="hsl(33,90%,70%)"></polygon>
                    <polygon points="15 0,6 30,0 30" fill="hsl(33,90%,50%)"></polygon>
                    <polygon points="15 0,20 10,10 10" fill="hsl(223,10%,10%)"></polygon>
                </g>
            </g>
        </svg>
        <p style="text-align: center; margin-top: 20px; font-weight: bold; color: white;">Comparing Candidates...</p>
    </div>

    <form class="form" id="uploadForm" action="/" method="POST" enctype="multipart/form-data">
        <p>
            AI Resume Matcher
            <span>Upload Resumes to Compare</span>
        </p>
        
        <input type="file" name="resume_a" required accept=".pdf">
        
        <div class="separator">
            <div></div>
            <span>VS</span>
            <div></div>
        </div>
        
        <input type="file" name="resume_b" required accept=".pdf">
        
        <button type="submit" class="oauthButton">
            Compare Candidates
        </button>
    </form>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function() {
            this.style.display = 'none';
            document.getElementById('loader').style.display = 'block';
        });
    </script>
</body>
</html>
